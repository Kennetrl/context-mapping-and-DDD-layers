  name: CI

  on:
    push:
      branches: ["**"]
    pull_request:
      branches: [main]

  jobs:
    checkstyle:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
        - name: Run Checkstyle
          working-directory: backend
          run: ./mvnw validate