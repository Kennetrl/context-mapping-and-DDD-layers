services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    container_name: veritrabajo-frontend-prod
    ports:
      - "80:80"
    environment:
      - BACKEND_URL=http://backend:8080/api/
    depends_on:
      - backend
    networks:
      - veritrabajo-network

  postgres:
    image: postgres:16-alpine
    container_name: veritrabajo-postgres-prod
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-veritrabajo}
      - POSTGRES_USER=${POSTGRES_USER:-veritrabajo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-veritrabajo}
    volumes:
      - veritrabajo-postgres-data-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-veritrabajo} -d $${POSTGRES_DB:-veritrabajo}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - veritrabajo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veritrabajo-backend-prod
    environment:
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-veritrabajo}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-veritrabajo}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-veritrabajo}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=false
      - SECURITY_JWT_SECRET=${SECURITY_JWT_SECRET:-clave-larga-de-prueba-minimo-32-bytes}
      - SPRING_AI_OPENAI_API_KEY=${SPRING_AI_OPENAI_API_KEY:-dev-placeholder}
      - SPRING_AI_OPENAI_BASE_URL=${SPRING_AI_OPENAI_BASE_URL:-https://api.groq.com/openai}
      - SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL=${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:-llama-3.1-8b-instant}
      - SPRING_AI_OPENAI_CHAT_OPTIONS_TEMPERATURE=${SPRING_AI_OPENAI_CHAT_OPTIONS_TEMPERATURE:-0.7}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - veritrabajo-backend-uploads-prod:/app/uploads
    networks:
      - veritrabajo-network

networks:
  veritrabajo-network:
    driver: bridge

volumes:
  veritrabajo-postgres-data-prod:
  veritrabajo-backend-uploads-prod:
